<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hassan ❤️ Hekmat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="terminal-screen">
    <pre id="terminal"></pre>

    <button id="startBtn" style="display:none;">
        🔓 Unlock Our Memory
    </button>
</div>

<audio id="bgMusic" loop>
    <source src="music/haga-mestakhabeya.mp3" type="audio/mp3">
</audio>

<div id="mainContent" class="hidden">

    <div class="floating-hearts"></div>

    <h1 class="glow">❤️ Hassan & Hekmat ❤️</h1>

    <div class="glass love-letter">
        <p id="typingText"></p>
    </div>

    <div class="gallery">
        <img src="images/photo1.jpg">
        <img src="images/photo2.jpg">
        <img src="images/photo3.jpg">
        <img src="images/photo4.jpg">
        <img src="images/photo5.jpg">
    </div>

    <div class="glass secret-box">
        <button onclick="showSecret()">💌 Reveal Secret</button>
        <p id="secretMessage"></p>
    </div>

    <div class="glass question">
        <h2>Will you keep making memories with me?</h2>

        <button class="yes-btn">Yes ❤️</button>
        <button class="no-btn" id="noBtn">No</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
