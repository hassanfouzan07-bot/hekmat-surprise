<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hassan ❤️ Hekmat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TERMINAL SCREEN -->
<div id="terminal-screen">
    <pre id="terminal"></pre>

    <button id="startBtn" style="display:none;">
        🔓 Unlock Our Memory
    </button>
</div>

<!-- MUSIC -->
<audio id="bgMusic" loop>
    <source src="music/haga-mestakhabeya.mp3" type="audio/mp3">
</audio>

<!-- MAIN CONTENT -->
<div id="mainContent" class="hidden">

    <h1 class="glow">❤️ Hassan & Hekmat ❤️</h1>

    <!-- LOVE LETTER -->
    <div class="glass love-letter">
        <p id="typingText"></p>
    </div>

    <!-- START MEMORY JOURNEY -->
    <div class="glass">
        <h2>💖 Our Memories</h2>
        <button id="startGalleryBtn">▶ Start Memory Journey</button>
    </div>

    <!-- SECRET -->
    <div class="glass secret-box">
        <button onclick="showSecret()">💌 Reveal Secret</button>
        <p id="secretMessage"></p>
    </div>

    <!-- QUESTION -->
    <div class="glass question">
        <h2>Will you keep making memories with me?</h2>

        <button class="yes-btn">Yes ❤️</button>
        <button class="no-btn" id="noBtn">No</button>
    </div>

</div>

<!-- FULLSCREEN VIEWER -->
<div id="viewer" class="hidden">
    <img id="viewerImg" src="">
    <p id="viewerText">Click anywhere for next memory ❤️</p>
</div>

<script src="script.js"></script>
</body>
</html>
