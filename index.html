<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hassan ❤️ Hekmat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOADING -->
<div id="loadingScreen">
  <h1>💖 Loading Love System...</h1>
  <p>Preparing something special for you ❤️</p>
</div>

<!-- UNLOCK -->
<div id="unlockScreen" class="hidden">
  <h1>🔓 Unlock the Love</h1>
  <button id="unlockBtn">Unlock ❤️</button>
</div>

<!-- OPEN -->
<div id="openScreen" class="hidden">
  <h1>💌 Click to open the most beautiful girl in the world</h1>
  <button id="openBtn">Open ❤️</button>
</div>

<!-- SLIDESHOW -->
<div id="slideScreen" class="hidden">
  <img id="slideImg" />
</div>

<!-- FINAL -->
<div id="finalScreen" class="hidden">
  <h1>❤️ Hekmat Heart Hassan ❤️</h1>

  <p>
    You are my peace. You are my home. You are my forever ❤️
  </p>

  <button id="secretBtn">💌 Reveal Secret</button>
  <p id="secretOutput"></p>

  <h2>Do you be with me till the end?</h2>

  <button class="yes-btn">Yes ❤️</button>
  <button id="noBtn" class="no-btn">No</button>
</div>

<script src="script.js"></script>

</body>
</html>
